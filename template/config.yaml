# Hermes config.yaml — persona template
#
# This file is generated by deploy-persona.sh from persona.json.
# You should not need to edit it manually — change persona.json instead
# and re-run the deploy script.
#
# If you need to override something manually (e.g. during development),
# edit this file directly. Note that the next deploy run will overwrite it.
#
# Hermes documentation: https://hermes-agent.nousresearch.com/docs

# ── Model ────────────────────────────────────────────────────────────────────
# Format for API models:  "anthropic/claude-opus-4-20250514"
#                         "openai/o3"
# Format for local vLLM:  just the model name, with base_url set below

model: anthropic/claude-sonnet-4-20250514

# Uncomment to route to local vLLM instead:
# model: Qwen/Qwen2.5-14B-Instruct-GPTQ-Int4
# base_url: http://vllm:8000/v1

# ── Display ──────────────────────────────────────────────────────────────────
display:
  skin: default        # Hermes CLI skin. "default" is fine for all personas.

# ── Memory ───────────────────────────────────────────────────────────────────
memory:
  enabled: true        # Hermes native memory. Works alongside persona_memory table.
